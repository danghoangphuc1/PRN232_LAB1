version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lms-db-container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrongPassword123!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 30s

  api:
    image: lms-api
    build:
      context: .
      dockerfile: PRN232.LMS.API/Dockerfile
    container_name: lms-api-container
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=PRN232_LMS;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql_data: